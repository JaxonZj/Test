<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Top Tokens</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .token-list {
      max-width: 500px;
      margin: auto;
      padding: 0;
    }

    ..token {
  background: #1e293b;
  margin: 10px 0;
  padding: 15px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  transition: all 0.25s ease;
  cursor: pointer;
}

/* Hover (desktop) */
.token:hover {
  transform: translateY(-5px) scale(1.02);
  background: #334155;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* Click / tap (mobile) */
.token:active {
  transform: scale(0.97);
  background: #475569;
}

  .rank {
     font-weight: bold;
     color: #22c55e;
     text-shadow: 0 0 8px rgba(34,197,94,0.6);
    }
  </style>
</head>
<body>

<h1>🚀 Top 20 Tokens</h1>

<div class="token-list">

  <!-- Tokens 1 to 20 -->
  <div class="token"><span class="rank">#1</span> <span>Token A</span></div>
  <div class="token"><span class="rank">#2</span> <span>Token B</span></div>
  <div class="token"><span class="rank">#3</span> <span>Token C</span></div>
  <div class="token"><span class="rank">#4</span> <span>Token D</span></div>

  <div class="token"><span class="rank">#6</span> <span>Token F</span></div>
  <div class="token"><span class="rank">#7</span> <span>Token G</span></div>
  <div class="token"><span class="rank">#8</span> <span>Token H</span></div>
  <div class="token"><span class="rank">#9</span> <span>Token I</span></div>
  <div class="token"><span class="rank">#10</span> <span>Token J</span></div>
  <div class="token"><span class="rank">#11</span> <span>Token K</span></div>
  <div class="token"><span class="rank">#12</span> <span>Token L</span></div>
  <div class="token"><span class="rank">#13</span> <span>Token M</span></div>
  <div class="token"><span class="rank">#14</span> <span>Token N</span></div>

</body>
</html>
